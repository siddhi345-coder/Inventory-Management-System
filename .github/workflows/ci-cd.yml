name: CI/CD to EC2

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:

  # ───────────────────────── BUILD JOB ─────────────────────────
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      # ───── FRONTEND ─────
      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm install

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build
        env:
          VITE_API_URL: /api
          VITE_REPORTS_URL: /reports-api

      # ───── BACKEND ─────
      - name: Install backend dependencies
        working-directory: ./backend
        run: npm install

      # ───── REPORTS SERVICE ─────
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install reports-service dependencies
        working-directory: ./reports-service
        run: pip install -r requirements.txt


  # ───────────────────────── DEPLOY JOB ─────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.0

        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          EC2_PATH: ${{ secrets.EC2_PATH }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}

        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: DB_HOST,DB_USER,DB_PASSWORD,JWT_SECRET,EC2_PATH,EMAIL_USER,EMAIL_PASS,FRONTEND_URL

          script: |
            echo "══════════════════════════════════════"
            echo "🚀 Starting Deployment"
            echo "══════════════════════════════════════"

            cd "$EC2_PATH"

            echo "📥 Pulling latest code..."
            git pull origin main

            echo "📝 Creating backend .env..."
            cat > backend/.env <<EOF
PORT=5000
DB_HOST=$DB_HOST
DB_PORT=3306
DB_USER=$DB_USER
DB_PASSWORD=$DB_PASSWORD
DB_NAME=laptop_shop
JWT_SECRET=$JWT_SECRET
PYTHON_SERVICE_URL=http://reports-service:8000
EMAIL_USER=$EMAIL_USER
EMAIL_PASS=$EMAIL_PASS
FRONTEND_URL=$FRONTEND_URL
EOF

            echo "📝 Creating reports-service .env..."
            cat > reports-service/.env <<EOF
DB_HOST=$DB_HOST
DB_PORT=3306
DB_USER=$DB_USER
DB_PASSWORD=$DB_PASSWORD
DB_NAME=laptop_shop
APP_PORT=8000
EOF

            echo "🛑 Stopping old containers..."
            docker-compose down --remove-orphans

            echo "🧹 Cleaning unused images..."
            docker system prune -f

            echo "🔨 Building and starting containers..."
            docker-compose up -d --build

            echo "⏳ Waiting for services to start..."
            sleep 20

            echo "🛠 Running DB migration..."
            docker exec backend node -e "
              const db = require('./src/config/db');
              db.query(
                'ALTER TABLE users 
                 ADD COLUMN IF NOT EXISTS reset_token VARCHAR(64) NULL,
                 ADD COLUMN IF NOT EXISTS reset_token_expires DATETIME NULL',
                (err) => {
                  if (err && err.code !== 'ER_DUP_FIELDNAME') {
                    console.error(err);
                  } else {
                    console.log('Migration completed');
                  }
                  process.exit(0);
                }
              );
            " || true

            echo "📦 Container status:"
            docker-compose ps

            echo "══════════════════════════════════════"
            echo "✅ Deployment Completed Successfully"
            echo "══════════════════════════════════════"
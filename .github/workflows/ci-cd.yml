name: CI/CD to EC2

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ── Job 1: Build & Test ──────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm install

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build
        env:
          VITE_API_URL: /api
          VITE_REPORTS_URL: /reports-api

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm install

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install reports-service dependencies
        working-directory: ./reports-service
        run: pip install -r requirements.txt

  # ── Job 2: Deploy to EC2 (only on push to main) ──────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "=== Navigating to project ==="
            cd ${{ secrets.EC2_PATH }}

            echo "=== Pulling latest code ==="
            git pull origin main

            echo "=== Updating .env files ==="
            cat > backend/.env << EOF
PORT=5000
DB_HOST=${{ secrets.DB_HOST }}
DB_PORT=3306
DB_USER=${{ secrets.DB_USER }}
DB_PASSWORD=${{ secrets.DB_PASSWORD }}
DB_NAME=laptop_shop
JWT_SECRET=${{ secrets.JWT_SECRET }}
PYTHON_SERVICE_URL=http://reports-service:8000
EOF

            cat > reports-service/.env << EOF
DB_HOST=${{ secrets.DB_HOST }}
DB_PORT=3306
DB_USER=${{ secrets.DB_USER }}
DB_PASSWORD=${{ secrets.DB_PASSWORD }}
DB_NAME=laptop_shop
APP_PORT=8000
EOF

            echo "=== Stopping old containers ==="
            docker-compose down

            echo "=== Cleaning unused images ==="
            docker system prune -f

            echo "=== Building and starting containers ==="
            docker-compose up -d --build

            echo "=== Waiting for containers to be ready ==="
            sleep 15

            echo "=== Container status ==="
            docker-compose ps

            echo "=== Backend health check ==="
            curl -f http://localhost:5000/api/auth/login \
              -X POST \
              -H "Content-Type: application/json" \
              -d '{"email":"test","password":"test"}' \
              -o /dev/null -s -w "Backend status: %{http_code}\n" || echo "Backend check done"

            echo "=== Deployment complete ==="

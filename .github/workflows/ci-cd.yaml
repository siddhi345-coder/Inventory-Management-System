name: CI/CD to EC2

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:

  # ─────────────── BUILD JOB ───────────────
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm install

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build
        env:
          VITE_API_URL: /api
          VITE_REPORTS_URL: /reports-api

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm install

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install reports-service dependencies
        working-directory: ./reports-service
        run: pip install -r requirements.txt


  # ─────────────── DEPLOY JOB ───────────────
  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.0
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          EC2_PATH: ${{ secrets.EC2_PATH }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: DB_HOST,DB_USER,DB_PASSWORD,JWT_SECRET,EC2_PATH,EMAIL_USER,EMAIL_PASS
          script: |
            set -e
            cd "$EC2_PATH"

            echo "=== Pulling latest code ==="
            git fetch origin main
            git reset --hard origin/main

            echo "=== Writing backend .env ==="
            printf "PORT=5000\nDB_HOST=%s\nDB_PORT=3306\nDB_USER=%s\nDB_PASSWORD=%s\nDB_NAME=laptop_shop\nJWT_SECRET=%s\nPYTHON_SERVICE_URL=http://reports-service:8000\nEMAIL_USER=%s\nEMAIL_PASS=%s\n" \
              "$DB_HOST" "$DB_USER" "$DB_PASSWORD" "$JWT_SECRET" "$EMAIL_USER" "$EMAIL_PASS" > backend/.env

            echo "=== Writing reports-service .env ==="
            printf "DB_HOST=%s\nDB_PORT=3306\nDB_USER=%s\nDB_PASSWORD=%s\nDB_NAME=laptop_shop\nAPP_PORT=8000\n" \
              "$DB_HOST" "$DB_USER" "$DB_PASSWORD" > reports-service/.env

            echo "=== Stopping old containers ==="
            docker-compose down --remove-orphans

            echo "=== Cleaning unused images ==="
            docker system prune -f

            echo "=== Building and starting containers ==="
            docker-compose up -d --build

            echo "=== Waiting for services ==="
            sleep 20

            echo "=== Container status ==="
            docker-compose ps

            echo "=== Deployment complete ==="
